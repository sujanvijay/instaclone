apiVersion: apps/v1
kind: Deployment
metadata:
  name: instaclone-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: instaclone
  template:
    metadata:
      labels:
        app: instaclone
    spec:
      containers:
      - name: instaclone
        image: sujanvijay/instagram_img:latest
        ports:
        - containerPort: 8000
